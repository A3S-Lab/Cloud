name: Architecture 3D Pages

on:
  push:
    branches:
      - main
    paths:
      - architecture-3d/**
      - .github/workflows/architecture-3d-pages.yml
      - README.md
  pull_request:
    paths:
      - architecture-3d/**
      - .github/workflows/architecture-3d-pages.yml
      - README.md
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: architecture-pages-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  validate:
    name: Validate architecture application
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: architecture-3d
    steps:
      - name: Checkout Cloud
        uses: actions/checkout@v4

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Bun 1.3.14
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check types
        run: bun run typecheck

      - name: Check formatting
        run: bun run format:check

      - name: Check lint
        run: bun run lint:check

      - name: Run tests
        run: bun run test

      - name: Configure repository base path
        run: echo "A3S_ARCHITECTURE_BASE_PATH=/${GITHUB_REPOSITORY#*/}/" >>"$GITHUB_ENV"

      - name: Build production application
        run: bun run build

      - name: Verify Pages artifact
        run: |
          repository_name=${GITHUB_REPOSITORY#*/}
          test -f dist/index.html
          test -f dist/.nojekyll
          grep --fixed-strings "/${repository_name}/static/" dist/index.html

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: architecture-3d/dist

  deploy:
    name: Deploy architecture application
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
