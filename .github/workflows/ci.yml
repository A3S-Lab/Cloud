name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust ${{ matrix.toolchain }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - 1.85.0
          - stable
    defaults:
      run:
        shell: bash
        working-directory: apps/cloud
    steps:
      - name: Checkout Cloud
        uses: actions/checkout@v4
        with:
          path: apps/cloud

      - name: Read pinned Runtime revision
        id: runtime_revision
        run: |
          revision=$(<tools/runtime-conformance/runtime-revision)
          [[ $revision =~ ^[0-9a-f]{40}$ ]]
          echo "revision=$revision" >>"$GITHUB_OUTPUT"

      - name: Checkout Runtime
        uses: actions/checkout@v4
        with:
          repository: A3S-Lab/Runtime
          ref: ${{ steps.runtime_revision.outputs.revision }}
          path: crates/runtime

      - name: Install Rust ${{ matrix.toolchain }}
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy,rustfmt

      - name: Validate locked metadata
        run: cargo metadata --locked --no-deps --format-version 1

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --workspace --all-targets --locked

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked

  gateway-managed-tls:
    name: Gateway managed TLS
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: apps/cloud
    steps:
      - name: Checkout Cloud
        uses: actions/checkout@v4
        with:
          path: apps/cloud

      - name: Read pinned Runtime revision
        id: runtime_revision
        run: |
          revision=$(<tools/runtime-conformance/runtime-revision)
          [[ $revision =~ ^[0-9a-f]{40}$ ]]
          echo "revision=$revision" >>"$GITHUB_OUTPUT"

      - name: Checkout Runtime
        uses: actions/checkout@v4
        with:
          repository: A3S-Lab/Runtime
          ref: ${{ steps.runtime_revision.outputs.revision }}
          path: crates/runtime

      - name: Install stable Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install A3S Gateway 1.0.12
        run: cargo install a3s-gateway --version 1.0.12 --locked

      - name: Serve an exact managed TLS snapshot
        run: |
          A3S_CLOUD_TEST_GATEWAY_BIN=$(command -v a3s-gateway) \
            cargo test -p a3s-cloud-node-agent --lib --locked \
              gateway::remote_tests::installed_a3s_gateway_serves_managed_tls_after_exact_snapshot_reload \
              -- --ignored --exact --nocapture --test-threads=1

  repository-policy:
    name: Repository policy
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: apps/cloud
    steps:
      - name: Checkout Cloud
        uses: actions/checkout@v4
        with:
          path: apps/cloud

      - name: Validate shell syntax
        run: bash -n tools/runtime-conformance/run_isolated_docker_gate.sh

      - name: Test OCI fixture helper
        run: python3 -m unittest discover -s tools/runtime-conformance -p 'test_*.py'

      - name: Enforce ACL-only product configuration
        run: |
          forbidden_files=$(git ls-files README.md config crates deploy docs web |
            rg '\.(hcl|tf|tfvars)$' || true)
          if [[ -n $forbidden_files ]]; then
            printf '%s\n' "$forbidden_files"
            exit 1
          fi
          if rg --hidden -n -i '\bHCL\b|\.hcl\b' \
            README.md config crates deploy docs web; then
            exit 1
          fi

  web:
    name: Web
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: apps/cloud/web
    steps:
      - name: Checkout Cloud
        uses: actions/checkout@v4
        with:
          path: apps/cloud

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint:check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
