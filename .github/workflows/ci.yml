name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust ${{ matrix.toolchain }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - 1.85.0
          - stable
    defaults:
      run:
        shell: bash
        working-directory: apps/cloud
    steps:
      - name: Checkout Cloud
        uses: actions/checkout@v4
        with:
          path: apps/cloud

      - name: Read pinned Runtime revision
        id: runtime_revision
        run: |
          revision=$(<tools/runtime-conformance/runtime-revision)
          [[ $revision =~ ^[0-9a-f]{40}$ ]]
          echo "revision=$revision" >>"$GITHUB_OUTPUT"

      - name: Checkout Runtime
        uses: actions/checkout@v4
        with:
          repository: A3S-Lab/Runtime
          ref: ${{ steps.runtime_revision.outputs.revision }}
          path: crates/runtime

      - name: Install Rust ${{ matrix.toolchain }}
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy,rustfmt

      - name: Validate locked metadata
        run: cargo metadata --locked --no-deps --format-version 1

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --workspace --all-targets --locked

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked

  github-source-resolution:
    name: GitHub source resolution
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: apps/cloud
    steps:
      - name: Checkout Cloud
        uses: actions/checkout@v4
        with:
          path: apps/cloud

      - name: Read pinned Runtime revision
        id: runtime_revision
        run: |
          revision=$(<tools/runtime-conformance/runtime-revision)
          [[ $revision =~ ^[0-9a-f]{40}$ ]]
          echo "revision=$revision" >>"$GITHUB_OUTPUT"

      - name: Checkout Runtime
        uses: actions/checkout@v4
        with:
          repository: A3S-Lab/Runtime
          ref: ${{ steps.runtime_revision.outputs.revision }}
          path: crates/runtime

      - name: Install Rust 1.85.0
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0

      - name: Resolve a public branch and confirm its pinned commit
        run: |
          cargo test -p a3s-cloud-control-plane --lib --locked \
            modules::sources::infrastructure::github_source_resolver::tests::real_github_resolves_a_public_branch_then_confirms_the_pinned_commit \
            -- --ignored --exact --nocapture --test-threads=1

      - name: Materialize the resolved commit through the secure checkout boundary
        run: |
          cargo test -p a3s-cloud-control-plane --lib --locked \
            modules::sources::infrastructure::git_source_checkout::tests::real_github_checkout_materializes_the_resolved_commit_without_git_metadata \
            -- --ignored --exact --nocapture --test-threads=1

  rootless-buildkit:
    name: Rootless BuildKit OCI output
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
        working-directory: apps/cloud
    steps:
      - name: Checkout Cloud
        uses: actions/checkout@v4
        with:
          path: apps/cloud

      - name: Read pinned Runtime revision
        id: runtime_revision
        run: |
          revision=$(<tools/runtime-conformance/runtime-revision)
          [[ $revision =~ ^[0-9a-f]{40}$ ]]
          echo "revision=$revision" >>"$GITHUB_OUTPUT"

      - name: Checkout Runtime
        uses: actions/checkout@v4
        with:
          repository: A3S-Lab/Runtime
          ref: ${{ steps.runtime_revision.outputs.revision }}
          path: crates/runtime

      - name: Install Rust 1.85.0
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0
          cache: false

      - name: Permit RootlessKit user namespaces on the Ubuntu runner
        run: |
          # Required by BuildKit rootless mode on Ubuntu 24.04:
          # https://github.com/moby/buildkit/blob/v0.31.2/docs/rootless.md#ubuntu-2404-or-later
          restriction=/proc/sys/kernel/apparmor_restrict_unprivileged_userns
          if [[ -r $restriction ]] && [[ $(< "$restriction") == 1 ]]; then
            sudo sysctl --write kernel.apparmor_restrict_unprivileged_userns=0
          fi
          [[ ! -r $restriction ]] || [[ $(< "$restriction") == 0 ]]

      - name: Start digest-pinned rootless BuildKit on an ephemeral loopback endpoint
        run: |
          buildkit_image=docker.io/moby/buildkit@sha256:0eeb84626c0cd01aecae7848c5ed8f095aec279dd936d0cdb5a64110f42ca65b
          docker pull "$buildkit_image"
          docker run --detach --privileged \
            --name a3s-cloud-buildkit \
            --publish 127.0.0.1:12340:1234 \
            "$buildkit_image" \
            --addr tcp://0.0.0.0:1234
          [[ $(docker inspect --format '{{.Config.User}}' a3s-cloud-buildkit) == 1000:1000 ]]
          docker cp a3s-cloud-buildkit:/usr/bin/buildctl "$RUNNER_TEMP/buildctl"
          chmod 0700 "$RUNNER_TEMP/buildctl"
          buildctl_version=$("$RUNNER_TEMP/buildctl" --version)
          [[ $buildctl_version == *"v0.31.2"* ]]
          ready=false
          for attempt in $(seq 1 90); do
            state=$(docker inspect --format '{{.State.Status}}' a3s-cloud-buildkit)
            if [[ $state == exited || $state == dead ]]; then
              docker logs a3s-cloud-buildkit
              exit 1
            fi
            if "$RUNNER_TEMP/buildctl" \
              --addr tcp://127.0.0.1:12340 debug workers >/dev/null 2>&1; then
              ready=true
              break
            fi
            sleep 1
          done
          if [[ $ready != true ]]; then
            docker logs a3s-cloud-buildkit
            exit 1
          fi
          [[ $(docker exec a3s-cloud-buildkit id -u) == 1000 ]]

      - name: Build and validate a real OCI image layout
        env:
          A3S_CLOUD_TEST_BUILDCTL: ${{ runner.temp }}/buildctl
          A3S_CLOUD_TEST_BUILDKIT_ADDRESS: tcp://127.0.0.1:12340
        run: |
          cargo test -p a3s-cloud-control-plane --lib --locked \
            modules::artifacts::infrastructure::buildkit_build_service::tests::real_rootless_buildkit_builds_and_validates_oci_layout \
            -- --ignored --exact --nocapture --test-threads=1

      - name: Stop rootless BuildKit
        if: always()
        run: |
          docker logs a3s-cloud-buildkit || true
          docker rm --force a3s-cloud-buildkit || true
          rm -f "$RUNNER_TEMP/buildctl"

  gateway-managed-tls:
    name: Gateway managed TLS
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: apps/cloud
    steps:
      - name: Checkout Cloud
        uses: actions/checkout@v4
        with:
          path: apps/cloud

      - name: Read pinned Runtime revision
        id: runtime_revision
        run: |
          revision=$(<tools/runtime-conformance/runtime-revision)
          [[ $revision =~ ^[0-9a-f]{40}$ ]]
          echo "revision=$revision" >>"$GITHUB_OUTPUT"

      - name: Checkout Runtime
        uses: actions/checkout@v4
        with:
          repository: A3S-Lab/Runtime
          ref: ${{ steps.runtime_revision.outputs.revision }}
          path: crates/runtime

      - name: Install stable Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install A3S Gateway 1.0.12
        run: cargo install a3s-gateway --version 1.0.12 --locked

      - name: Serve and recover exact Gateway snapshots
        run: |
          A3S_CLOUD_TEST_GATEWAY_BIN=$(command -v a3s-gateway) \
            cargo test -p a3s-cloud-node-agent --lib --locked \
              gateway::remote_tests::installed_a3s_gateway_serves_managed_tls_after_exact_snapshot_reload \
              -- --ignored --exact --nocapture --test-threads=1
          A3S_CLOUD_TEST_GATEWAY_BIN=$(command -v a3s-gateway) \
            cargo test -p a3s-cloud-node-agent --lib --locked \
              gateway::reload_crash_tests::installed_a3s_gateway_recovers_reload_after_agent_process_death \
              -- --ignored --exact --nocapture --test-threads=1

  s3-compatible-logs:
    name: S3-compatible logs
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: apps/cloud
    steps:
      - name: Checkout Cloud
        uses: actions/checkout@v4
        with:
          path: apps/cloud

      - name: Read pinned Runtime revision
        id: runtime_revision
        run: |
          revision=$(<tools/runtime-conformance/runtime-revision)
          [[ $revision =~ ^[0-9a-f]{40}$ ]]
          echo "revision=$revision" >>"$GITHUB_OUTPUT"

      - name: Checkout Runtime
        uses: actions/checkout@v4
        with:
          repository: A3S-Lab/Runtime
          ref: ${{ steps.runtime_revision.outputs.revision }}
          path: crates/runtime

      - name: Install Rust 1.85.0
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0

      - name: Start pinned MinIO
        run: |
          docker run --detach --rm \
            --name a3s-cloud-minio \
            --publish 127.0.0.1:9000:9000 \
            --env MINIO_ROOT_USER=a3s-cloud-test \
            --env MINIO_ROOT_PASSWORD=a3s-cloud-test-secret \
            quay.io/minio/minio@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e \
            server /data --address :9000
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:9000/minio/health/ready >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs a3s-cloud-minio
          exit 1

      - name: Create disposable log bucket
        run: |
          docker run --rm --network host \
            --env MC_HOST_local=http://a3s-cloud-test:a3s-cloud-test-secret@127.0.0.1:9000 \
            quay.io/minio/mc@sha256:aead63c77f9db9107f1696fb08ecb0faeda23729cde94b0f663edf4fe09728e3 \
            mb --ignore-existing local/a3s-cloud-ci

      - name: Exercise immutable S3 log lifecycle
        env:
          A3S_CLOUD_TEST_S3_ACCESS_KEY_ID: a3s-cloud-test
          A3S_CLOUD_TEST_S3_BUCKET: a3s-cloud-ci
          A3S_CLOUD_TEST_S3_ENDPOINT: http://127.0.0.1:9000
          A3S_CLOUD_TEST_S3_REGION: us-east-1
          A3S_CLOUD_TEST_S3_SECRET_ACCESS_KEY: a3s-cloud-test-secret
        run: |
          cargo test -p a3s-cloud-control-plane --lib --locked \
            modules::fleet::infrastructure::s3_log_chunk_store::tests::real_s3_compatible_store_preserves_immutable_log_semantics \
            -- --ignored --exact --nocapture --test-threads=1

      - name: Stop MinIO
        if: always()
        run: docker rm --force a3s-cloud-minio || true

  linux-secret-logs:
    name: Linux Secret and logs
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
        working-directory: apps/cloud
    steps:
      - name: Checkout Cloud
        uses: actions/checkout@v4
        with:
          path: apps/cloud

      - name: Read pinned Runtime revision
        id: runtime_revision
        run: |
          revision=$(<tools/runtime-conformance/runtime-revision)
          [[ $revision =~ ^[0-9a-f]{40}$ ]]
          echo "revision=$revision" >>"$GITHUB_OUTPUT"

      - name: Checkout Runtime
        uses: actions/checkout@v4
        with:
          repository: A3S-Lab/Runtime
          ref: ${{ steps.runtime_revision.outputs.revision }}
          path: crates/runtime

      - name: Install Rust 1.85.0
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.85.0

      - name: Start pinned PostgreSQL and private registry fixture
        env:
          A3S_CLOUD_TEST_REGISTRY_USERNAME: a3s-cloud-ci
          A3S_CLOUD_TEST_REGISTRY_PASSWORD: a3s-cloud-ci-password
        run: |
          docker run --detach --rm \
            --name a3s-cloud-secret-log-postgres \
            --publish 127.0.0.1:54320:5432 \
            --tmpfs /var/lib/postgresql/data:rw,nosuid,nodev,noexec,size=2147483648 \
            --env POSTGRES_DB=postgres \
            --env POSTGRES_USER=a3s_cloud \
            --env POSTGRES_PASSWORD=a3s_cloud \
            postgres@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
          for attempt in $(seq 1 90); do
            if docker exec a3s-cloud-secret-log-postgres \
              pg_isready --dbname=postgres --username=a3s_cloud >/dev/null 2>&1; then
              break
            fi
            [[ $attempt -ne 90 ]]
            sleep 0.5
          done
          docker pull \
            docker.io/library/busybox@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          registry_image=registry:2.8.3@sha256:a3d8aaa63ed8681a604f1dea0aa03f100d5895b6a58ace528858a7b332415373
          htpasswd_image=httpd:2.4.63-alpine@sha256:cc34b8bdde6ee55ea52db9819baa13ea36e4c7447eb7595db9ea720d1831851e
          docker pull "$registry_image"
          docker pull "$htpasswd_image"
          auth_directory="$RUNNER_TEMP/a3s-cloud-registry-auth"
          install -d -m 0700 "$auth_directory"
          docker run --rm \
            --entrypoint /usr/local/apache2/bin/htpasswd \
            "$htpasswd_image" -Bbn \
            "$A3S_CLOUD_TEST_REGISTRY_USERNAME" \
            "$A3S_CLOUD_TEST_REGISTRY_PASSWORD" \
            >"$auth_directory/htpasswd"
          docker run --detach --rm \
            --name a3s-cloud-secret-log-registry \
            --publish 127.0.0.1:50030:5000 \
            --mount "type=bind,source=$auth_directory,target=/auth,readonly" \
            --env REGISTRY_AUTH=htpasswd \
            --env REGISTRY_AUTH_HTPASSWD_REALM="A3S Cloud acceptance" \
            --env REGISTRY_AUTH_HTPASSWD_PATH=/auth/htpasswd \
            "$registry_image"
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error --max-time 2 \
              --user "$A3S_CLOUD_TEST_REGISTRY_USERNAME:$A3S_CLOUD_TEST_REGISTRY_PASSWORD" \
              http://127.0.0.1:50030/v2/ >/dev/null; then
              break
            fi
            [[ $attempt -ne 60 ]]
            sleep 0.5
          done
          [[ $(curl --silent --output /dev/null --write-out '%{http_code}' \
            http://127.0.0.1:50030/v2/) == 401 ]]
          printf '%s' "$A3S_CLOUD_TEST_REGISTRY_PASSWORD" |
            docker login 127.0.0.1:50030 \
              --username "$A3S_CLOUD_TEST_REGISTRY_USERNAME" \
              --password-stdin
          private_repository=127.0.0.1:50030/a3s/busybox
          docker tag \
            docker.io/library/busybox@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662 \
            "$private_repository:acceptance"
          docker push "$private_repository:acceptance"
          private_reference=
          while IFS= read -r reference; do
            case "$reference" in
              "$private_repository"@sha256:*)
                private_reference=$reference
                break
                ;;
            esac
          done < <(docker image inspect \
            --format '{{range .RepoDigests}}{{println .}}{{end}}' \
            "$private_repository:acceptance")
          [[ -n $private_reference ]]
          echo "A3S_CLOUD_TEST_PRIVATE_REGISTRY_ARTIFACT=oci://$private_reference" \
            >>"$GITHUB_ENV"
          image_id=$(docker image inspect \
            --format '{{.Id}}' "$private_repository:acceptance")
          docker image rm --force "$image_id"
          ! docker image inspect "$private_reference" >/dev/null 2>&1

      - name: Exercise PostgreSQL-backed Secret injection and redacted logs
        env:
          A3S_CLOUD_TEST_DOCKER: "1"
          A3S_CLOUD_TEST_DOCKER_SOCKET: unix:///var/run/docker.sock
          A3S_CLOUD_TEST_POSTGRES_URL: postgres://a3s_cloud:a3s_cloud@127.0.0.1:54320/postgres
          A3S_CLOUD_TEST_SECRET_MEMORY_DIR: /dev/shm/a3s-cloud/ci-secret-logs
          A3S_CLOUD_TEST_REGISTRY_USERNAME: a3s-cloud-ci
          A3S_CLOUD_TEST_REGISTRY_PASSWORD: a3s-cloud-ci-password
        run: |
          install -d -m 0700 "$A3S_CLOUD_TEST_SECRET_MEMORY_DIR"
          cargo test -p a3s-cloud-control-plane --test postgres_integration --locked --no-run
          test_binary=$(find target/debug/deps -maxdepth 1 -type f \
            -name 'postgres_integration-*' -perm -111 -print -quit)
          [[ -n $test_binary ]]
          sudo env \
            A3S_CLOUD_TEST_DOCKER="$A3S_CLOUD_TEST_DOCKER" \
            A3S_CLOUD_TEST_DOCKER_SOCKET="$A3S_CLOUD_TEST_DOCKER_SOCKET" \
            A3S_CLOUD_TEST_POSTGRES_URL="$A3S_CLOUD_TEST_POSTGRES_URL" \
            A3S_CLOUD_TEST_SECRET_MEMORY_DIR="$A3S_CLOUD_TEST_SECRET_MEMORY_DIR" \
            A3S_CLOUD_TEST_PRIVATE_REGISTRY_ARTIFACT="$A3S_CLOUD_TEST_PRIVATE_REGISTRY_ARTIFACT" \
            A3S_CLOUD_TEST_REGISTRY_USERNAME="$A3S_CLOUD_TEST_REGISTRY_USERNAME" \
            A3S_CLOUD_TEST_REGISTRY_PASSWORD="$A3S_CLOUD_TEST_REGISTRY_PASSWORD" \
            RUST_BACKTRACE=1 \
            "$test_binary" \
            postgres_foundation_is_migrated_atomic_and_idempotent \
            --exact --nocapture --test-threads=1
          [[ -z $(sudo find "$A3S_CLOUD_TEST_SECRET_MEMORY_DIR" -type f -print -quit) ]]

      - name: Stop Secret and log fixtures
        if: always()
        run: |
          managed_containers=$(docker ps --all --quiet \
            --filter label=a3s.cloud.managed=true)
          for container in $managed_containers; do
            docker inspect --format \
              'name={{.Name}} state={{.State.Status}} exit={{.State.ExitCode}} ports={{json .NetworkSettings.Ports}} mounts={{range .Mounts}}{{.Destination}}:rw={{.RW}} {{end}}' \
              "$container" || true
          done
          [[ -z $managed_containers ]] ||
            docker rm --force $managed_containers || true
          docker rm --force a3s-cloud-secret-log-registry || true
          docker rm --force a3s-cloud-secret-log-postgres || true
          docker logout 127.0.0.1:50030 || true
          rm -rf "$RUNNER_TEMP/a3s-cloud-registry-auth"
          sudo rm -rf /dev/shm/a3s-cloud/ci-secret-logs

  repository-policy:
    name: Repository policy
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: apps/cloud
    steps:
      - name: Checkout Cloud
        uses: actions/checkout@v4
        with:
          path: apps/cloud

      - name: Validate shell syntax
        run: |
          bash -n tools/runtime-conformance/run_isolated_docker_gate.sh
          bash -n tools/release-conformance/run_clean_host_gate.sh

      - name: Test OCI fixture helper
        run: python3 -m unittest discover -s tools/runtime-conformance -p 'test_*.py'

      - name: Test clean-host release driver
        run: python3 -m unittest discover -s tools/release-conformance -p 'test_*.py'

      - name: Enforce ACL-only product configuration
        run: |
          forbidden_files=$(git ls-files README.md config crates deploy docs tools web |
            rg '\.(hcl|tf|tfvars)$' || true)
          if [[ -n $forbidden_files ]]; then
            printf '%s\n' "$forbidden_files"
            exit 1
          fi
          if rg --hidden -n -i '\bHCL\b|\.hcl\b' \
            README.md config crates deploy docs tools web; then
            exit 1
          fi

  web:
    name: Web
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: apps/cloud/web
    steps:
      - name: Checkout Cloud
        uses: actions/checkout@v4
        with:
          path: apps/cloud

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            cache_dir="$RUNNER_TEMP/a3s-cloud-bun-cache-$attempt"
            rm -rf node_modules "$cache_dir"
            install_args=(
              --frozen-lockfile
              --backend=copyfile
              --cache-dir="$cache_dir"
              --network-concurrency=8
            )
            if [[ $attempt -eq 3 ]]; then
              install_args+=(--force --no-cache)
            fi
            if timeout --signal=TERM --kill-after=10s 180s \
              bun install "${install_args[@]}"; then
              rm -rf "$cache_dir"
              break
            fi
            [[ $attempt -lt 3 ]] || exit 1
            rm -rf node_modules "$cache_dir"
            sleep $((attempt * 5))
          done

      - name: Typecheck
        run: bun run typecheck

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint:check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
