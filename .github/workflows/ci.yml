name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust ${{ matrix.toolchain }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - 1.85.0
          - stable
    defaults:
      run:
        shell: bash
        working-directory: apps/cloud
    steps:
      - name: Checkout Cloud
        uses: actions/checkout@v4
        with:
          path: apps/cloud

      - name: Read pinned Runtime revision
        id: runtime_revision
        run: |
          revision=$(<tools/runtime-conformance/runtime-revision)
          [[ $revision =~ ^[0-9a-f]{40}$ ]]
          echo "revision=$revision" >>"$GITHUB_OUTPUT"

      - name: Checkout Runtime
        uses: actions/checkout@v4
        with:
          repository: A3S-Lab/Runtime
          ref: ${{ steps.runtime_revision.outputs.revision }}
          path: crates/runtime

      - name: Install Rust ${{ matrix.toolchain }}
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy,rustfmt

      - name: Validate locked metadata
        run: cargo metadata --locked --no-deps --format-version 1

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --workspace --all-targets --locked

      - name: Download pinned A3S Gateway
        if: matrix.toolchain == 'stable'
        id: gateway
        env:
          A3S_GATEWAY_VERSION: 1.0.12
          A3S_GATEWAY_SHA256: fe62259fc8a8515a1bd2547d33bbee750dee78cf7b3eb2e514123ce4214969f5
        run: |
          archive="a3s-gateway-${A3S_GATEWAY_VERSION}-linux-x86_64.tar.gz"
          directory="${RUNNER_TEMP}/a3s-gateway-${A3S_GATEWAY_VERSION}"
          mkdir -p "$directory"
          curl --fail --show-error --silent --location \
            "https://github.com/A3S-Lab/Gateway/releases/download/v${A3S_GATEWAY_VERSION}/${archive}" \
            --output "${directory}/${archive}"
          printf '%s  %s\n' "$A3S_GATEWAY_SHA256" "${directory}/${archive}" |
            sha256sum --check
          tar --extract --gzip --file "${directory}/${archive}" --directory "$directory"
          test -x "${directory}/a3s-gateway"
          echo "binary=${directory}/a3s-gateway" >>"$GITHUB_OUTPUT"

      - name: Certify route-bearing Gateway compatibility
        if: matrix.toolchain == 'stable'
        env:
          A3S_CLOUD_TEST_GATEWAY_BIN: ${{ steps.gateway.outputs.binary }}
        run: |
          "$A3S_CLOUD_TEST_GATEWAY_BIN" --version |
            rg '^a3s-gateway 1\.0\.12$'
          cargo test -p a3s-cloud-control-plane --locked \
            modules::edge::infrastructure::gateway_snapshot_compiler::tests::installed_gateway_validates_compiled_snapshot \
            -- --exact
          cargo test -p a3s-cloud-node-agent --locked \
            gateway::tests::installed_a3s_gateway_validates_and_reloads_complete_snapshots \
            -- --exact

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked

  repository-policy:
    name: Repository policy
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: apps/cloud
    steps:
      - name: Checkout Cloud
        uses: actions/checkout@v4
        with:
          path: apps/cloud

      - name: Validate shell syntax
        run: bash -n tools/runtime-conformance/run_isolated_docker_gate.sh

      - name: Test OCI fixture helper
        run: python3 -m unittest discover -s tools/runtime-conformance -p 'test_*.py'

      - name: Enforce ACL-only product configuration
        run: |
          forbidden_files=$(git ls-files README.md config crates deploy docs web |
            rg '\.(hcl|tf|tfvars)$' || true)
          if [[ -n $forbidden_files ]]; then
            printf '%s\n' "$forbidden_files"
            exit 1
          fi
          if rg --hidden -n -i '\bHCL\b|\.hcl\b' \
            README.md config crates deploy docs web; then
            exit 1
          fi

  web:
    name: Web
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
        working-directory: apps/cloud/web
    steps:
      - name: Checkout Cloud
        uses: actions/checkout@v4
        with:
          path: apps/cloud

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint:check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
