name: Docker provider conformance

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/docker-conformance.yml
      - Cargo.lock
      - Cargo.toml
      - crates/contracts/**
      - crates/control-plane/**
      - crates/node-agent/**
      - tools/runtime-conformance/**
  pull_request:
    paths:
      - .github/workflows/docker-conformance.yml
      - Cargo.lock
      - Cargo.toml
      - crates/contracts/**
      - crates/control-plane/**
      - crates/node-agent/**
      - tools/runtime-conformance/**
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-provider-conformance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docker-certification:
    name: ${{ matrix.suite == 'provider' && 'Real Docker provider' || 'Cloud consumer recovery' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        suite:
          - provider
          - cloud
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Cloud
        uses: actions/checkout@v4
        with:
          path: apps/cloud

      - name: Read pinned Runtime revision
        id: runtime_revision
        working-directory: apps/cloud
        run: |
          revision=$(<tools/runtime-conformance/runtime-revision)
          [[ $revision =~ ^[0-9a-f]{40}$ ]]
          echo "revision=$revision" >>"$GITHUB_OUTPUT"

      - name: Checkout Runtime
        uses: actions/checkout@v4
        with:
          repository: A3S-Lab/Runtime
          ref: ${{ steps.runtime_revision.outputs.revision }}
          path: crates/runtime

      - name: Install stable Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Verify disposable Linux provider host
        run: |
          required_commands=(
            awk comm curl docker find findmnt git losetup mkfs.ext4 mount
            mountpoint nsenter pkill python3 realpath sha256sum sort stat
            sudo tee timeout truncate umount
          )
          for command in "${required_commands[@]}"; do
            command -v "$command" >/dev/null
          done
          [[ -e /dev/loop-control ]]
          docker info >/dev/null
          sudo docker info >/dev/null

      - name: Pull pinned certification fixtures
        run: |
          images=(
            "docker@sha256:66d292e5c26bd33a6f6f61cacb880de2186339a524ecba1ce098dbbaceed6515"
            "registry@sha256:a3d8aaa63ed8681a604f1dea0aa03f100d5895b6a58ace528858a7b332415373"
            "postgres@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193"
            "nats@sha256:e4bf19f15fd3218814a4e3c9e0064e1334bd8aa20d5984b9f1a0afd084f8cc00"
          )
          for image in "${images[@]}"; do
            docker pull "$image"
            docker image inspect "$image" >/dev/null
          done

      - name: Run isolated Docker Runtime certification
        env:
          EVIDENCE_DIR: ${{ runner.temp }}/a3s-docker-${{ matrix.suite }}-evidence
          RUNTIME_SUITE: ${{ matrix.suite }}
          RUNTIME_REVISION: ${{ steps.runtime_revision.outputs.revision }}
        run: |
          cloud_revision=$(git -C apps/cloud rev-parse HEAD)
          cargo_bin=$(command -v cargo)
          cargo_home=${CARGO_HOME:-$(dirname "$(dirname "$cargo_bin")")}
          rustup_home=$(rustup show home)
          mkdir -p "$EVIDENCE_DIR"

          set +e
          sudo env \
            CARGO_HOME="$cargo_home" \
            RUSTUP_HOME="$rustup_home" \
            apps/cloud/tools/runtime-conformance/run_isolated_docker_gate.sh \
              --source-root "$GITHUB_WORKSPACE" \
              --cloud-sha "$cloud_revision" \
              --runtime-sha "$RUNTIME_REVISION" \
              --evidence-dir "$EVIDENCE_DIR" \
              --cargo "$cargo_bin" \
              --suite "$RUNTIME_SUITE" \
              --ttl-seconds 3000
          gate_status=$?
          set -e

          sudo chown -R "$(id -u):$(id -g)" "$EVIDENCE_DIR" || true
          exit "$gate_status"

      - name: Upload certification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-${{ matrix.suite }}-conformance-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/a3s-docker-${{ matrix.suite }}-evidence
          if-no-files-found: warn
          retention-days: 14
