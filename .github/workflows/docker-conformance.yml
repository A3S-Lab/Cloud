name: Docker provider conformance

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/docker-conformance.yml
      - Cargo.lock
      - Cargo.toml
      - crates/node-agent/**
      - tools/runtime-conformance/**
  pull_request:
    paths:
      - .github/workflows/docker-conformance.yml
      - Cargo.lock
      - Cargo.toml
      - crates/node-agent/**
      - tools/runtime-conformance/**
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-provider-conformance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docker-provider:
    name: Real Docker provider
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Cloud
        uses: actions/checkout@v4
        with:
          path: apps/cloud

      - name: Read pinned Runtime revision
        id: runtime_revision
        working-directory: apps/cloud
        run: |
          revision=$(<tools/runtime-conformance/runtime-revision)
          [[ $revision =~ ^[0-9a-f]{40}$ ]]
          echo "revision=$revision" >>"$GITHUB_OUTPUT"

      - name: Checkout Runtime
        uses: actions/checkout@v4
        with:
          repository: A3S-Lab/Runtime
          ref: ${{ steps.runtime_revision.outputs.revision }}
          path: crates/runtime

      - name: Install stable Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Verify disposable Linux provider host
        run: |
          required_commands=(
            awk comm curl docker find findmnt git losetup mkfs.ext4 mount
            mountpoint nsenter pkill python3 realpath sha256sum sort stat
            sudo tee timeout truncate umount
          )
          for command in "${required_commands[@]}"; do
            command -v "$command" >/dev/null
          done
          [[ -e /dev/loop-control ]]
          docker info >/dev/null
          sudo docker info >/dev/null

      - name: Pull pinned provider fixtures
        run: |
          images=(
            "docker@sha256:66d292e5c26bd33a6f6f61cacb880de2186339a524ecba1ce098dbbaceed6515"
            "registry@sha256:a3d8aaa63ed8681a604f1dea0aa03f100d5895b6a58ace528858a7b332415373"
          )
          for image in "${images[@]}"; do
            docker pull "$image"
            docker image inspect "$image" >/dev/null
          done

      - name: Run isolated Docker Runtime certification
        env:
          EVIDENCE_DIR: ${{ runner.temp }}/a3s-docker-provider-evidence
          RUNTIME_REVISION: ${{ steps.runtime_revision.outputs.revision }}
        run: |
          cloud_revision=$(git -C apps/cloud rev-parse HEAD)
          cargo_bin=$(command -v cargo)
          mkdir -p "$EVIDENCE_DIR"

          set +e
          sudo apps/cloud/tools/runtime-conformance/run_isolated_docker_gate.sh \
            --source-root "$GITHUB_WORKSPACE" \
            --cloud-sha "$cloud_revision" \
            --runtime-sha "$RUNTIME_REVISION" \
            --evidence-dir "$EVIDENCE_DIR" \
            --cargo "$cargo_bin" \
            --ttl-seconds 3000
          gate_status=$?
          set -e

          sudo chown -R "$(id -u):$(id -g)" "$EVIDENCE_DIR" || true
          exit "$gate_status"

      - name: Upload certification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-provider-conformance-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/a3s-docker-provider-evidence
          if-no-files-found: warn
          retention-days: 14
